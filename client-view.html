<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Suivi des travaux — Basso Services Viticoles</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#8B1A2B;--gl:#F5E6E8;--gd:#6B1220;--gold:#C9A84C;--goldl:#FBF3D5;--bg:#fff;--bg2:#f8f8f7;--bg3:#f3f3f1;--text:#1a1a1a;--text2:#6b6b6b;--text3:#999;--border:#e5e5e3;--radius:10px;--radius-lg:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;min-height:100vh}

.topbar{background:linear-gradient(135deg,#6B1220 0%,#8B1A2B 60%,#C9A84C 130%);padding:20px 18px 28px;color:#fff}
.topbar-inner{max-width:640px;margin:0 auto}
.tb-logo{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.tb-logo img{width:42px;height:42px;border-radius:50%;border:2px solid rgba(255,255,255,.6);object-fit:contain;background:#fff}
.tb-logo-text{font-size:13px;font-weight:700;letter-spacing:.02em}
.tb-logo-sub{font-size:10px;opacity:.8}
.tb-client{font-size:20px;font-weight:700;margin-top:6px}
.tb-zone{font-size:12px;opacity:.85;margin-top:2px;display:flex;align-items:center;gap:5px}

.wrap{max-width:640px;margin:0 auto;padding:0 18px 60px}

.summary-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:-18px;margin-bottom:18px}
.sum-card{background:var(--bg);border-radius:var(--radius);padding:14px;box-shadow:0 4px 16px rgba(0,0,0,.06);border:1px solid var(--border)}
.sum-l{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.sum-v{font-size:19px;font-weight:700;color:var(--g)}

.section-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin:22px 0 10px;display:flex;align-items:center;gap:6px}

.task-card{background:var(--bg);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.task-card.active{border-color:var(--gold);box-shadow:0 4px 16px rgba(201,168,76,.15)}
.task-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.task-title{font-size:15px;font-weight:700;color:var(--g)}
.task-status{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.st-encurso{background:var(--goldl);color:#7a5c00}
.st-pendiente{background:#f1efe8;color:#5f5e5a}
.st-terminado{background:#E8F5E9;color:#1B5E20}
.st-urgente{background:#FFF0F0;color:#791F1F}
.task-meta{font-size:12px;color:var(--text2);display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px}
.task-meta span{display:flex;align-items:center;gap:4px}

.progress-block{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px}
.progress-pct{font-weight:700;color:var(--g);font-size:13px}
.pbar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.pfill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--g),var(--gold));transition:width .4s ease}
.progress-detail{font-size:11px;color:var(--text3);margin-top:5px}

.amount-block{margin-top:10px;background:var(--goldl);border-radius:var(--radius);padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.amount-label{font-size:11px;color:#7a5c00}
.amount-value{font-size:16px;font-weight:700;color:#7a5c00}

.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty i{font-size:38px;color:var(--border);margin-bottom:10px;display:block}

.footer-note{text-align:center;font-size:11px;color:var(--text3);margin-top:30px;padding-top:20px;border-top:1px solid var(--border);line-height:1.6}

.loader{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.error-box{max-width:400px;margin:80px auto;text-align:center;padding:30px 20px}
.error-box i{font-size:48px;color:var(--g);margin-bottom:14px;display:block}
.error-box h2{font-size:17px;margin-bottom:8px;color:var(--g)}
.error-box p{font-size:13px;color:var(--text2);line-height:1.6}

@media(max-width:480px){
  .summary-row{grid-template-columns:1fr 1fr}
  .tb-client{font-size:18px}
}
</style>
</head>
<body>

<div id="root">
  <div class="loader">
    <div class="spinner"></div>
    <div style="color:var(--text2);font-size:13px">Chargement de votre suivi...</div>
  </div>
</div>

<script>
// ─── Config (misma conexión que la app admin) ───
const SB='https://yopdehtfbfjdaocnbmgo.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvcGRlaHRmYmZqZGFvY25ibWdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDI5NDcsImV4cCI6MjA5Nzk3ODk0N30.yoMs_TaBFcJWvjSAzzr11gson31iwUXNO-UCCpdo1c8';
const SH={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'};

async function sbGet(t,p=''){const r=await fetch(`${SB}/rest/v1/${t}?${p}`,{headers:SH});if(!r.ok)throw new Error(await r.text());return r.json();}

const COL_LABELS={
  pendiente:{l:'En attente',cls:'st-pendiente'},
  porhacer:{l:'Programmé',cls:'st-pendiente'},
  urgente:{l:'Urgent',cls:'st-urgente'},
  encurso:{l:'En cours',cls:'st-encurso'},
  terminado:{l:'Terminé',cls:'st-terminado'}
};

function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function init(){
  const token = getParam('token');
  const root = document.getElementById('root');

  if(!token){
    showError('Lien invalide', "Ce lien d'accès n'est pas valide. Merci de contacter Basso Services Viticoles pour obtenir votre lien personnel.");
    return;
  }

  try{
    // 1. Validar el token
    const links = await sbGet('client_share_links', `select=*&token=eq.${encodeURIComponent(token)}&activo=eq.true`);
    if(!links || !links.length){
      showError('Accès expiré', "Ce lien n'est plus actif. Merci de contacter Basso Services Viticoles pour obtenir un nouveau lien.");
      return;
    }
    const link = links[0];

    // 2. Cargar datos del cliente
    const clientes = await sbGet('clientes', `select=*&id=eq.${link.cid}`);
    if(!clientes || !clientes.length){
      showError('Client introuvable', "Une erreur s'est produite. Merci de contacter Basso Services Viticoles.");
      return;
    }
    const cliente = clientes[0];

    // 3. Cargar tareas del Kanban de ese cliente
    const tareas = await sbGet('kanban', `select=*&cid=eq.${link.cid}&order=id.desc`);

    // 4. Cargar servicios/tarifas del cliente (para mostrar precio si aplica)
    const servicios = await sbGet('servicios_cliente', `select=*&cid=eq.${link.cid}`);

    render(cliente, tareas, servicios);

  }catch(e){
    showError('Erreur de connexion', "Impossible de charger vos données pour le moment. Merci de réessayer dans quelques instants.");
  }
}

function showError(title, msg){
  document.getElementById('root').innerHTML = `
    <div class="error-box">
      <i class="ti ti-alert-circle"></i>
      <h2>${escapeHtml(title)}</h2>
      <p>${escapeHtml(msg)}</p>
    </div>`;
}

function findTarifa(servicios, servicioNombre, tipo){
  // Busca la tarifa correspondiente al nombre del servicio
  const match = servicios.find(s => (s.servicio||'').trim().toLowerCase() === (servicioNombre||'').trim().toLowerCase());
  if(!match) return null;
  if(tipo === 'cepas') return parseFloat(match.precio_cepa) || 0;
  if(tipo === 'kg') return parseFloat(match.precio_kg) || 0;
  if(tipo === 'horas') return parseFloat(match.precio_hora) || 0;
  return parseFloat(match.precio_t) || 0;
}

function render(cliente, tareas, servicios){
  const zonaIcon = cliente.zona === 'Saint-Émilion' ? 'ti-grain' : cliente.zona === 'Pomerol' ? 'ti-grape' : 'ti-leaf';

  // Separar tareas activas (no terminadas) de terminadas
  const activas = tareas.filter(t => t.columna !== 'terminado');
  const terminadas = tareas.filter(t => t.columna === 'terminado');

  // Resumen
  const totalActivas = activas.length;
  const totalTerminadas = terminadas.length;

  let html = `
    <div class="topbar">
      <div class="topbar-inner">
        <div class="tb-logo">
          <div class="tb-logo-text">
            BASSO SERVICES VITICOLES
            <div class="tb-logo-sub">Suivi de vos travaux en temps réel</div>
          </div>
        </div>
        <div class="tb-client">${escapeHtml(cliente.nombre)}</div>
        <div class="tb-zone"><i class="ti ${zonaIcon}"></i> ${escapeHtml(cliente.zona || '')}</div>
      </div>
    </div>

    <div class="wrap">
      <div class="summary-row">
        <div class="sum-card">
          <div class="sum-l">Travaux en cours</div>
          <div class="sum-v">${totalActivas}</div>
        </div>
        <div class="sum-card">
          <div class="sum-l">Travaux terminés</div>
          <div class="sum-v">${totalTerminadas}</div>
        </div>
      </div>`;

  // ─── Tareas activas ───
  html += `<div class="section-title"><i class="ti ti-clock"></i> En cours</div>`;

  if(!activas.length){
    html += `<div class="empty"><i class="ti ti-calendar-event"></i>Aucun travail en cours pour le moment.</div>`;
  } else {
    activas.forEach(t => {
      html += renderTaskCard(t, servicios, true);
    });
  }

  // ─── Historial terminadas ───
  if(terminadas.length){
    html += `<div class="section-title"><i class="ti ti-circle-check"></i> Historique</div>`;
    terminadas.slice(0, 10).forEach(t => {
      html += renderTaskCard(t, servicios, false);
    });
  }

  html += `
      <div class="footer-note">
        Basso Services Viticoles · Saint-Émilion · Pomerol · Fronsac<br>
        Ce lien est personnel — merci de ne pas le partager.
      </div>
    </div>`;

  document.getElementById('root').innerHTML = html;
}

function renderTaskCard(t, servicios, isActive){
  const statusInfo = COL_LABELS[t.columna] || {l:t.columna, cls:'st-pendiente'};
  const cantidadTotal = parseFloat(t.cantidad_total) || 0;
  const cantidadHecha = parseFloat(t.cantidad_completada) || 0;
  const tieneProgreso = cantidadTotal > 0;
  const pct = tieneProgreso ? Math.min(100, Math.round((cantidadHecha / cantidadTotal) * 100)) : 0;
  const unidad = t.unidad || '';

  let progressHtml = '';
  let amountHtml = '';

  if(tieneProgreso){
    progressHtml = `
      <div class="progress-block">
        <div class="progress-label">
          <span>Avancement</span>
          <span class="progress-pct">${pct}%</span>
        </div>
        <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
        <div class="progress-detail">${formatNum(cantidadHecha)} / ${formatNum(cantidadTotal)} ${escapeHtml(unidad)}</div>
      </div>`;

    // Calcular importe si encontramos la tarifa
    const tipoTarifa = unidad === 'cepas' ? 'cepas' : unidad === 'kg' ? 'kg' : unidad === 'heures' || unidad === 'horas' ? 'horas' : null;
    if(tipoTarifa){
      const tarifa = findTarifa(servicios, (t.servicio||''), tipoTarifa);
      if(tarifa && tarifa > 0){
        const monto = (cantidadHecha * tarifa).toFixed(2);
        amountHtml = `
          <div class="amount-block">
            <span class="amount-label">Montant à date (${formatNum(cantidadHecha)} × ${tarifa.toFixed(2)}€)</span>
            <span class="amount-value">${monto}€</span>
          </div>`;
      }
    }
  }

  return `
    <div class="task-card ${isActive?'active':''}">
      <div class="task-top">
        <div class="task-title">${escapeHtml((t.titulo||'').split('—')[0].trim())}</div>
        <span class="task-status ${statusInfo.cls}">${statusInfo.l}</span>
      </div>
      <div class="task-meta">
        <span><i class="ti ti-calendar"></i> ${escapeHtml(t.fecha_prevista || '—')}</span>
        ${t.jefe ? `<span><i class="ti ti-user"></i> ${escapeHtml(t.jefe)}</span>` : ''}
      </div>
      ${progressHtml}
      ${amountHtml}
    </div>`;
}

function formatNum(n){
  return new Intl.NumberFormat('fr-FR').format(n);
}

init();
</script>
</body>
</html>
